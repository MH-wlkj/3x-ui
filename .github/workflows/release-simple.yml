name: Release 3X-UI (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Build frontend bundle
        run: |
          npm install
          npm run build
        working-directory: frontend

      - name: Install system dependencies (CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libc6-dev

      - name: Build 3X-UI (amd64)
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=amd64
          LDFLAGS="-w -s"
          go build -ldflags "$LDFLAGS" -o xui-release -v main.go

      - name: Package release
        run: |
          mkdir -p x-ui/bin
          cp xui-release x-ui/x-ui
          cp x-ui.sh x-ui/
          cp x-ui.service.debian x-ui/
          cp x-ui.service.arch x-ui/
          cp x-ui.service.rhel x-ui/

          # Download Xray-core
          cd x-ui/bin
          wget -q https://github.com/XTLS/Xray-core/releases/download/v26.7.11/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          rm -f Xray-linux-64.zip geoip.dat geosite.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          mv xray xray-linux-amd64

          # Download mtg-multi (MTProto sidecar)
          MTG_MULTI_VER=$(curl -sfL "https://api.github.com/repos/mhsanaei/mtg-multi/releases/latest" | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -n 1)
          if [ -n "$MTG_MULTI_VER" ]; then
            MTG_PKG="mtg-multi-${MTG_MULTI_VER#v}-linux-amd64"
            wget -q "https://github.com/mhsanaei/mtg-multi/releases/download/${MTG_MULTI_VER}/${MTG_PKG}.tar.gz"
            tar -xzf "${MTG_PKG}.tar.gz"
            mv "${MTG_PKG}/mtg-multi" "mtg-linux-amd64"
            rm -rf "${MTG_PKG}" "${MTG_PKG}.tar.gz"
          fi
          cd ../..

          tar -zcvf x-ui-linux-amd64.tar.gz x-ui

      - name: Upload to GH release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: x-ui-linux-amd64.tar.gz
          asset_name: x-ui-linux-amd64.tar.gz
          overwrite: true
