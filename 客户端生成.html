<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x-ui 终极节点路由一体化生成器 Pro Max</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4338ca; margin-top: 0; margin-bottom: 20px; font-weight: 800; }
        
        .settings-panel { background-color: #eef2ff; border: 1px solid #c7d2fe; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .settings-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .settings-row:last-child { margin-bottom: 0; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #4b5563; font-size: 14px; }
        textarea, input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 14px; background-color: #fff; }
        textarea:focus, input:focus, select:focus { border-color: #4338ca; outline: none; box-shadow: 0 0 0 2px rgba(67, 56, 202, 0.2); }
        
        button.generate-btn { background-color: #4338ca; color: white; border: none; padding: 16px 24px; font-size: 18px; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; width: 100%; font-weight: bold; box-shadow: 0 4px 6px rgba(67, 56, 202, 0.3); letter-spacing: 1px; }
        button.generate-btn:hover { background-color: #3730a3; transform: translateY(-1px); }
        
        .output-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 25px; }
        @media (max-width: 900px) { .output-grid { grid-template-columns: 1fr; } }
        
        .output-box { position: relative; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .output-box label { color: #047857; font-size: 15px; display: block; margin-bottom: 10px; border-bottom: 2px solid #34d399; padding-bottom: 5px; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: background-color 0.2s; z-index: 10; }
        .copy-btn:hover { background: #059669; }
        
        .status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: #059669; min-height: 20px; font-size: 16px; }
        .error-msg { color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 终极三合一：客户端 + 路由规则 一键生成器</h1>

    <div class="settings-panel">
        <div class="settings-row">
            <div class="form-group">
                <label>🏷️ Email 前缀</label>
                <input type="text" id="emailPrefix" value="MZ1-" placeholder="如: MZ1-">
            </div>
            <div class="form-group">
                <label>🏷️ Email 后缀</label>
                <input type="text" id="emailSuffix" value="" placeholder="如: -HK (留空则不加)">
            </div>
            <div class="form-group">
                <label>📊 流量限制 (GB)</label>
                <input type="number" id="totalGB" value="0" min="0" title="0代表无限制">
            </div>
            <div class="form-group">
                <label>🚪 目标入站 ID</label>
                <input type="number" id="inboundId" value="1" min="1" title="对应面板里入站列表的ID编号">
            </div>
        </div>

        <div class="settings-row" style="border-top: 1px dashed #c7d2fe; padding-top: 15px;">
            <div class="form-group">
                <label>🔄 命名规则</label>
                <select id="namingMode" onchange="toggleSequenceSettings()">
                    <option value="ip">使用 IP 地址命名 (前缀+IP+后缀)</option>
                    <option value="seq">使用 顺序数字命名 (前缀+数字+后缀)</option>
                </select>
            </div>
            <div class="form-group seq-setting" style="display: none;">
                <label>🔢 起始数字</label>
                <input type="number" id="startNum" value="1" min="1">
            </div>
            <div class="form-group seq-setting" style="display: none;">
                <label>📏 数字补零位数</label>
                <input type="number" id="padLength" value="2" min="1" max="5" title="设为2则输出01,02">
            </div>
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 25px;">
        <label>📥 填入上游 SK5 节点列表 (格式要求: IP:端口:账号:密码)</label>
        <textarea id="nodeInput" rows="8" placeholder="198.65.65.250:7176:user:pass&#10;198.65.122.168:6808:user:pass"></textarea>
    </div>

    <button class="generate-btn" onclick="generateAll()">🚀 一键生成 客户端 + 出站规则 + 路由规则</button>
    <div id="statusMessage" class="status-msg"></div>

    <div class="output-grid">
        <div class="output-box">
            <label>1️⃣ 客户端 JSON (用于面板批量导入)</label>
            <button class="copy-btn" onclick="copyText('jsonClients', this)">复制</button>
            <textarea id="jsonClients" rows="20" readonly placeholder="导入面板的客户端配置..."></textarea>
        </div>
        
        <div class="output-box">
            <label>2️⃣ Xray 出站规则 (Outbounds)</label>
            <button class="copy-btn" onclick="copyText('jsonOutbounds', this)">复制</button>
            <textarea id="jsonOutbounds" rows="20" readonly placeholder="Xray高级配置里的出站代理..."></textarea>
        </div>

        <div class="output-box">
            <label>3️⃣ Xray 路由规则 (Routing)</label>
            <button class="copy-btn" onclick="copyText('jsonRouting', this)">复制</button>
            <textarea id="jsonRouting" rows="20" readonly placeholder="将客户流量分发到出站的路由规则..."></textarea>
        </div>
    </div>
</div>

<script>
    function toggleSequenceSettings() {
        try {
            const mode = document.getElementById('namingMode').value;
            const seqElements = document.querySelectorAll('.seq-setting');
            seqElements.forEach(el => { el.style.display = (mode === 'seq') ? 'flex' : 'none'; });
        } catch(e) {}
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function generateRandomString(length) {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return result;
    }

    function safeGetValue(id, defaultVal = '') {
        const el = document.getElementById(id);
        return el ? el.value : defaultVal;
    }

    function generateAll() {
        const statusMsg = document.getElementById('statusMessage');
        
        try {
            const nodeText = safeGetValue('nodeInput').trim();
            const prefix = safeGetValue('emailPrefix');
            const suffix = safeGetValue('emailSuffix');
            const totalGB = parseInt(safeGetValue('totalGB')) || 0;
            const targetInboundId = parseInt(safeGetValue('inboundId')) || 1; // 抓取入站ID
            const namingMode = safeGetValue('namingMode', 'ip');
            let currentNum = parseInt(safeGetValue('startNum')) || 1;
            const padLen = parseInt(safeGetValue('padLength')) || 1;

            if (!nodeText) {
                statusMsg.textContent = "❌ 请先输入包含 IP:端口:账号:密码 的节点列表！";
                statusMsg.className = "status-msg error-msg";
                return;
            }

            const lines = nodeText.split('\n');
            const clients = [];
            const outbounds = [];
            const routing = [];
            let processedCount = 0;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                // 解析 ip:port:user:pass
                const parts = line.split(':');
                if (parts.length >= 4) {
                    const ip = parts[0];
                    const port = parseInt(parts[1]);
                    const user = parts[2];
                    const pass = parts[3];

                    // 1. 生成独一无二的名称 (Email & Tag 共享)
                    let emailName = "";
                    if (namingMode === 'seq') {
                        let numStr = currentNum.toString();
                        while (numStr.length < padLen) numStr = '0' + numStr;
                        emailName = `${prefix}${numStr}${suffix}`;
                        currentNum++;
                    } else {
                        emailName = `${prefix}${ip}${suffix}`;
                    }

                    // 2. 构建 3x-ui 面板批量导入专用的客户端包裹格式
                    clients.push({
                        client: {
                            id: generateUUID(),
                            security: "auto",
                            password: generateRandomString(16),
                            auth: generateRandomString(16),
                            email: emailName,
                            limitIp: 0,
                            totalGB: totalGB * 1073741824,
                            expiryTime: 0,
                            enable: true,
                            tgId: 0,
                            subId: generateRandomString(16)
                        },
                        inboundIds: [ targetInboundId ] // 指定挂载的入站ID
                    });

                    // 3. 构建 出站规则数据 (Outbounds)
                    outbounds.push({
                        tag: emailName, 
                        protocol: "socks",
                        settings: {
                            servers: [{ address: ip, port: port, users: [{ user: user, pass: pass }] }]
                        }
                    });

                    // 4. 构建 路由规则数据 (Routing)
                    routing.push({
                        type: "field",
                        user: [emailName], 
                        outboundTag: emailName 
                    });

                    processedCount++;
                }
            });

            if (processedCount === 0) {
                statusMsg.textContent = "❌ 未解析到有效数据！请确保输入格式为 IP:端口:账号:密码 (冒号需为英文半角)";
                statusMsg.className = "status-msg error-msg";
                return;
            }

            document.getElementById('jsonClients').value = JSON.stringify(clients, null, 2);
            document.getElementById('jsonOutbounds').value = JSON.stringify(outbounds, null, 2);
            document.getElementById('jsonRouting').value = JSON.stringify(routing, null, 2);
            
            statusMsg.textContent = `✅ 生成成功！共处理了 ${processedCount} 个客户端。当前指定的入站 ID 为：${targetInboundId}`;
            statusMsg.className = "status-msg";

        } catch (error) {
            statusMsg.textContent = "❌ 代码运行中断：" + error.message;
            statusMsg.className = "status-msg error-msg";
            console.error(error);
        }
    }

    function copyText(elementId, btn) {
        try {
            const textarea = document.getElementById(elementId);
            if (!textarea.value) return;
            textarea.select();
            document.execCommand('copy');
            
            const originalText = btn.innerText;
            btn.innerText = '✅ 已复制';
            btn.style.backgroundColor = '#047857';
            setTimeout(() => { 
                btn.innerText = originalText; 
                btn.style.backgroundColor = '#10b981'; 
            }, 1500);
        } catch (error) {
            alert("复制失败，请手动全选复制！");
        }
    }
</script>

</body>
</html>
